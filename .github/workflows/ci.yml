name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
      - name: Smoke-test the CLI (offline mock provider)
        run: |
          conclave tools
          conclave run "What is 6 * 7?" --mode single
          conclave run "Explain CI in one paragraph" --mode orchestrate --trace trace.json
          test -f trace.json
      - name: Run the examples
        run: |
          python examples/quickstart.py
          python examples/custom_tool.py
          python examples/research_team.py
